<svg width="200" height="40" viewBox="0 0 200 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="prism-lw-1" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#a8d45e"/>
      <stop offset="0.5" stop-color="#3ecfac"/>
      <stop offset="1" stop-color="#2e7cc9"/>
    </linearGradient>
    <linearGradient id="prism-lw-2" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#3ecfac" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#2e7cc9" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="text-grad-light" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#a8d45e"/>
      <stop offset="0.5" stop-color="#3ecfac"/>
      <stop offset="1" stop-color="#2e7cc9"/>
    </linearGradient>
  </defs>
  <!-- Prism icon scaled to fit ~40px -->
  <g transform="translate(0, 4) scale(0.2)">
    <path d="M80 12 L148 80 L80 148 L12 80 Z" stroke="url(#prism-lw-1)" stroke-width="3.5" fill="none" transform="translate(0, 0)"/>
    <rect x="50" y="50" width="60" height="60" stroke="url(#prism-lw-2)" stroke-width="2.5" fill="none"/>
    <line x1="80" y1="12" x2="80" y2="50" stroke="url(#prism-lw-1)" stroke-width="2.5"/>
    <line x1="80" y1="110" x2="80" y2="148" stroke="url(#prism-lw-1)" stroke-width="2.5"/>
    <line x1="12" y1="80" x2="50" y2="80" stroke="url(#prism-lw-1)" stroke-width="2.5"/>
    <line x1="110" y1="80" x2="148" y2="80" stroke="url(#prism-lw-1)" stroke-width="2.5"/>
    <circle cx="80" cy="80" r="6" fill="#3ecfac"/>
    <circle cx="80" cy="12" r="4" fill="#a8d45e"/>
    <circle cx="148" cy="80" r="4" fill="#3ecfac"/>
    <circle cx="80" cy="148" r="4" fill="#2e7cc9"/>
    <circle cx="12" cy="80" r="4" fill="#3ecfac"/>
  </g>
  <!-- "AI Enablement" text -->
  <text x="48" y="28" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="url(#text-grad-light)">AI Enablement</text>
